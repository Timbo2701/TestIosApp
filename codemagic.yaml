workflows:
  expo-test:
    name: Expo Test Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Test Expo export
        script: |
          npx expo export

    artifacts:
      - dist/**

  ios-unsigned-ipa:
    name: iOS Unsigned IPA for Signulous
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_WORKSPACE: "ios/TestIosApp.xcworkspace"
        XCODE_SCHEME: "TestIosApp"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Generate native iOS project
        script: |
          npx expo prebuild -p ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build unsigned archive
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/build/TestIosApp.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Create unsigned IPA
        script: |
          mkdir -p "$CM_BUILD_DIR/build/Payload"
          cp -R "$CM_BUILD_DIR/build/TestIosApp.xcarchive/Products/Applications/TestIosApp.app" "$CM_BUILD_DIR/build/Payload/"
          cd "$CM_BUILD_DIR/build"
          zip -r TestIosApp-unsigned.ipa Payload

    artifacts:
      - build/*.ipa
      - build/*.xcarchive
